<div class="page-shell" appMouseParallax [class.light-theme]="isLightTheme">
  @if (showIntro) {
    <div class="intro-overlay" aria-live="polite">
      <div class="intro-content">
        <p class="intro-kicker">Loading portfolio</p>
        <h2>{{ name }}</h2>
      </div>
    </div>
  }

  <div class="noise-layer" aria-hidden="true"></div>
  <div class="spotlight" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand-stack">
      <span class="status-pill">Open for backend roles</span>
      <a class="brand" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ name }}
      </a>
    </div>

    <nav class="nav-links" aria-label="Primary">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="top-actions">
      <button class="button button-ghost" type="button" (click)="toggleTheme()">
        {{ isLightTheme ? 'Dark' : 'Light' }} mode
      </button>
      <a class="button button-ghost" routerLink="/contact">Let’s talk</a>
    </div>
  </header>

  <main [@routeAnimations]="prepareRoute(outlet)">
    <div class="route-stage">
      <router-outlet #outlet="outlet"></router-outlet>
    </div>
  </main>
</div>
